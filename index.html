<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI Personality Insight Premium</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f0f0f;color:#f5e6b3;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{max-width:760px;width:100%;background:#181818;border:1px solid #c9a227;border-radius:20px;padding:30px;box-shadow:0 0 20px rgba(201,162,39,.3)}
h1,h2{text-align:center;color:#ffd76a}
.btn{background:#c9a227;color:#111;border:none;padding:15px 25px;border-radius:12px;cursor:pointer;font-weight:bold;width:100%;margin-top:20px}
.option{display:block;width:100%;margin:10px 0;padding:14px;border:1px solid #c9a227;background:#111;color:#f5e6b3;border-radius:12px;cursor:pointer}
.hidden{display:none}.progress{text-align:right;margin-bottom:15px;color:#ffd76a}
input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #c9a227;background:#111;color:#fff;margin:8px 0}
</style>
</head>
<body>
<div class="container">
<div id="landing">
<h1>MBTI Personality Insight</h1>
<p style="text-align:center">Tes psikologis premium untuk mengenal kepribadian, potensi, gaya belajar, relasi, dan arah karir Anda.</p>
<button class="btn" onclick="showIdentity()">Mulai Tes Sekarang</button>
</div>
<div id="identity" class="hidden">
<h2>Data Diri</h2>
<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="number" id="usia" placeholder="Usia">
<select id="gender"><option>Laki-laki</option><option>Perempuan</option></select>
<button class="btn" onclick="startTest()">Lanjut ke Soal</button>
</div>
<div id="quiz" class="hidden">
<div class="progress" id="progress"></div>
<h2 id="question"></h2>
<button class="option" onclick="answer(4)">Sangat Setuju</button>
<button class="option" onclick="answer(3)">Setuju</button>
<button class="option" onclick="answer(2)">Tidak Setuju</button>
<button class="option" onclick="answer(1)">Sangat Tidak Setuju</button>
</div>
<div id="loading" class="hidden"><h2>Sedang Menganalisis Kepribadian Anda...</h2><p style='text-align:center;color:#fff'>Menyusun profil personal, dimensi psikologis, dan insight premium...</p></div>
<div id="result" class="hidden"></div>
</div>
<script>
const mbtiResults = {
ISTJ:{title:'ISTJ — The Inspector',desc:'Pribadi yang terstruktur, realistis, disiplin, dan sangat dapat diandalkan.',strength:'Teliti, konsisten, bertanggung jawab, loyal.',weak:'Cenderung kaku, sulit menerima perubahan.',career:'Akuntan, auditor, administrasi, analis data.',relation:'Setia namun tidak mudah mengungkapkan emosi.',tips:'Belajar lebih fleksibel.'},
ISFJ:{title:'ISFJ — The Defender',desc:'Pribadi hangat, setia, tenang, dan menjaga kenyamanan orang lain.',strength:'Sabar, suportif, perhatian.',weak:'Sulit menolak, memendam perasaan.',career:'Guru, perawat, administrasi.',relation:'Sangat setia dan protektif.',tips:'Sampaikan kebutuhan diri.'},
INFJ:{title:'INFJ — The Advocate',desc:'Pribadi mendalam, intuitif, penuh makna.',strength:'Bijaksana, empatik, visioner.',weak:'Overthinking, lelah emosional.',career:'Psikolog, penulis, konselor.',relation:'Tulus namun selektif.',tips:'Jangan memikul semua sendiri.'},
INTJ:{title:'INTJ — The Strategist',desc:'Pemikir visioner yang analitis dan strategis.',strength:'Strategis, logis, visioner.',weak:'Perfeksionis, terkesan dingin.',career:'Programmer, peneliti, engineer.',relation:'Selektif tetapi loyal.',tips:'Buka ruang kolaborasi.'},
ISTP:{title:'ISTP — The Craftsman',desc:'Problem solver yang tenang dan logis.',strength:'Praktis, analitis, mandiri.',weak:'Sulit terbuka.',career:'Teknisi, engineer.',relation:'Peduli lewat tindakan.',tips:'Latih komunikasi emosional.'},
ISFP:{title:'ISFP — The Artist',desc:'Pribadi lembut, spontan, artistik.',strength:'Kreatif, fleksibel, peka.',weak:'Kurang terarah.',career:'Desain, seni, kuliner.',relation:'Hangat tapi butuh ruang.',tips:'Bangun tujuan jangka panjang.'},
INFP:{title:'INFP — The Mediator',desc:'Pribadi idealis dan sensitif.',strength:'Empatik, kreatif, tulus.',weak:'Mudah bimbang.',career:'Penulis, konselor.',relation:'Hangat namun hati-hati.',tips:'Ubah idealisme jadi aksi.'},
INTP:{title:'INTP — The Thinker',desc:'Pemikir mendalam yang suka analisis.',strength:'Logis, konseptual.',weak:'Overthinking.',career:'Programmer, peneliti.',relation:'Selektif.',tips:'Seimbangkan pikir dan eksekusi.'},
ESTP:{title:'ESTP — The Dynamo',desc:'Pribadi energik, spontan, suka tantangan.',strength:'Gesit, persuasif.',weak:'Impulsif.',career:'Sales, entrepreneur.',relation:'Seru dan ekspresif.',tips:'Timbang risiko.'},
ESFP:{title:'ESFP — The Entertainer',desc:'Pribadi ceria dan ekspresif.',strength:'Ramah, optimis.',weak:'Kurang konsisten.',career:'MC, hospitality.',relation:'Penuh warna.',tips:'Bangun kedisiplinan.'},
ENFP:{title:'ENFP — The Campaigner',desc:'Pribadi kreatif, antusias, penuh ide.',strength:'Komunikatif, inspiratif.',weak:'Mudah bosan.',career:'Marketing, guru, entrepreneur.',relation:'Hangat dan ekspresif.',tips:'Latih konsistensi.'},
ENTP:{title:'ENTP — The Debater',desc:'Pribadi penuh ide dan suka tantangan intelektual.',strength:'Inovatif, cerdas.',weak:'Lompat ide.',career:'Strategist, kreator.',relation:'Komunikatif dan suka debat.',tips:'Tuntaskan satu ide.'},
ESTJ:{title:'ESTJ — The Executive',desc:'Pribadi tegas, sistematis, fokus hasil.',strength:'Disiplin, organisatoris.',weak:'Kaku, dominan.',career:'Manajer, supervisor.',relation:'Melindungi namun mengatur.',tips:'Dengar sudut pandang lain.'},
ESFJ:{title:'ESFJ — The Caregiver',desc:'Pribadi hangat dan peduli harmoni sosial.',strength:'Empatik, kooperatif.',weak:'Sulit menolak.',career:'Guru, HRD.',relation:'Penuh perhatian.',tips:'Pasang batas emosional.'},
ENFJ:{title:'ENFJ — The Protagonist',desc:'Pribadi karismatik dan suportif.',strength:'Inspiratif, komunikatif.',weak:'Mudah kecewa.',career:'Trainer, public speaker.',relation:'Hangat.',tips:'Jaga energi diri.'},
ENTJ:{title:'ENTJ — The Commander',desc:'Pemimpin alami yang ambisius.',strength:'Tegas, efisien.',weak:'Dominan.',career:'CEO, strategist.',relation:'Protektif.',tips:'Latih empati.'}
};
const questions = Array.from({length:40}, (_,i)=>"Pernyataan MBTI Premium Nomor "+(i+1));
let current=0; let scores=[];
function showIdentity(){landing.classList.add('hidden');identity.classList.remove('hidden');}
function startTest(){identity.classList.add('hidden');quiz.classList.remove('hidden');loadQuestion();}
function loadQuestion(){document.getElementById('question').innerText=questions[current];document.getElementById('progress').innerText=`${current+1}/40`;}
function answer(val){scores.push(val);current++; if(current<questions.length){loadQuestion()} else {quiz.classList.add('hidden');loading.classList.remove('hidden');setTimeout(showResult,2500)}}
function calcDim(start,end){let total=0;for(let i=start;i<=end;i++){total+=scores[i]||1;} return total;}
function showResult(){
loading.classList.add('hidden');
let EI=calcDim(0,9), SN=calcDim(10,19), TF=calcDim(20,29), JP=calcDim(30,39);
let keys=Object.keys(mbtiResults);
let type=keys[(EI+SN+TF+JP)%16];
let data=mbtiResults[type];
document.getElementById('result').classList.remove('hidden');
document.getElementById('result').innerHTML=`<div style='border:1px solid #c9a227;padding:20px;border-radius:18px;background:#111;'>
<h1>${data.title}</h1>
<p style='text-align:center'>Halo ${document.getElementById('nama').value}, berikut hasil analisis kepribadian premium Anda.</p>
<p><b>Deskripsi Inti:</b> ${data.desc}</p>
<p><b>Kekuatan:</b> ${data.strength}</p>
<p><b>Tantangan:</b> ${data.weak}</p>
<p><b>Karir Cocok:</b> ${data.career}</p>
<p><b>Relasi Sosial:</b> ${data.relation}</p>
<p><b>Tips Pengembangan:</b> ${data.tips}</p>
<a href='https://wa.me/6281234567890' target='_blank'><button class='btn'>Konsultasi Hasil via WhatsApp</button></a>
<p style='text-align:center;font-style:italic;color:#ffd76a;margin-top:20px'>"Kenali dirimu, maksimalkan potensimu."</p></div>`;
}
</script>
</body>
</html>
